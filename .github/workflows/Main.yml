name: Auto Update Tapmad Playlist

on:
  workflow_dispatch:

  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # Checkout Public Repo
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      # Create .gitignore
      - name: Create Gitignore
        run: |
          echo "private_repo/" > .gitignore

      # Clone Private Repo
      - name: Clone Private Repo
        run: |
          git clone https://${{ secrets.PRIVATE_TOKEN }}@github.com/${{ secrets.PRIVATE_REPO }}.git private_repo

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install Dependencies
      - name: Install Dependencies
        run: |
          pip install requests

      # Run Private Script
      - name: Run Script
        run: |
          python private_repo/tapmad_sm.py

      # Commit & Push Updated Playlist
      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add Tapmad_sm.m3u

          git commit -m "Auto Update Tapmad Playlist" || echo "No changes to commit"

          git push

      # Cleanup Private Repo
      - name: Cleanup
        run: |
          rm -rf private_repo
